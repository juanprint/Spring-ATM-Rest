<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        width: 100%;
        overflow-x: hidden;
    }
    img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .col-form{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

</style>
<body>
    <div class="row vh-100">
        <div class="col-6">
            <img src="bydefault.jpg" alt="">
        </div>
        <div class="col-6 col-form">
            <h1>Banca por Internet</h1>
            <form>
                <div class="form-group">
                    <label for="dniInput">DNI</label>
                    <input id="dniInput" class="form-control" type="text" placeholder="Ingrese su DNI" maxlength="8"
                </div>
                <div class="form-group">
                    <label for="NumeroTarjeta">Numero de tarjeta</label>
                    <input id="NumeroTarjeta" type="text" class="form-control" placeholder="Ingrese su numero de tarjeta"
                    maxlength="16"
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
